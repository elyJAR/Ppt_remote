name: Windows EXE Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Attach EXE to this existing release tag (e.g. pre-v0.2.0). Leave blank to upload as artifact only."
        required: false
        type: string
  push:
    tags:
      - "pre-v*"

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop_bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.15.0

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --console `
            --name PptRemoteBridge `
            bridge_service.py

      - name: Verify EXE exists
        run: |
          if (-not (Test-Path "dist\PptRemoteBridge.exe")) {
            throw "EXE not found after build"
          }
          Write-Host "EXE size: $((Get-Item dist\PptRemoteBridge.exe).Length) bytes"

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PptRemoteBridge-windows-exe
          path: desktop_bridge/dist/PptRemoteBridge.exe
          retention-days: 30

      - name: Resolve release tag
        id: tag
        if: github.event_name == 'push' || github.event.inputs.release_tag != ''
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach EXE to GitHub release
        if: steps.tag.outputs.value != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: false
          artifacts: desktop_bridge/dist/PptRemoteBridge.exe
          artifactErrorsFailBuild: true
