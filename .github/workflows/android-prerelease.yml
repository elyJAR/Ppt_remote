name: Android Build and Pre-Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for prerelease (example: pre-v0.1.0)"
        required: false
        type: string
  push:
    tags:
      - "pre-v*"

permissions:
  contents: write

jobs:
  build-and-prerelease:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile_remote_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        continue-on-error: true
        run: gradle :app:lint

      - name: Run unit tests
        continue-on-error: true
        run: gradle :app:test

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: mobile_remote_android/app/build/reports/lint-results*.html
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: mobile_remote_android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Build signed release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          gradle :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          rm -f keystore.jks

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=pre-v0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect APK artifacts
        id: apks
        shell: bash
        run: |
          ARTIFACTS="mobile_remote_android/app/build/outputs/apk/debug/app-debug.apk"
          RELEASE="mobile_remote_android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "../$RELEASE" ]; then
            ARTIFACTS="$ARTIFACTS,../$RELEASE"
          fi
          echo "paths=$ARTIFACTS" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub prerelease
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: Android prerelease ${{ steps.tag.outputs.value }}
          prerelease: true
          generateReleaseNotes: true
          commit: ${{ github.sha }}
          artifacts: mobile_remote_android/app/build/outputs/apk/debug/app-debug.apk
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
