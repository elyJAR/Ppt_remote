name: Android Build and Pre-Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for prerelease (example: pre-v0.1.0)"
        required: false
        type: string
  push:
    tags:
      - "pre-v*"

permissions:
  contents: write

jobs:
  build-and-prerelease:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile_remote_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Auto version bump from tag ────────────────────────────────────────────
      # Reads the tag (e.g. pre-v1.2.1) and writes versionName + versionCode
      # into build.gradle.kts before building so the APK always matches the tag.
      - name: Bump version from tag
        shell: bash
        run: |
          # Determine tag: push event or manual input
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          # Strip leading "pre-v" or "v" prefix → e.g. "1.2.1"
          VERSION=$(echo "$TAG" | sed 's/^pre-v//;s/^v//')

          if [ -z "$VERSION" ]; then
            echo "No version extracted from tag '$TAG', skipping bump"
            exit 0
          fi

          # Compute versionCode as integer: major*10000 + minor*100 + patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-1}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "Tag: $TAG  →  versionName=$VERSION  versionCode=$VERSION_CODE"

          # Patch build.gradle.kts in-place
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

          echo "Updated build.gradle.kts:"
          grep -E "versionCode|versionName" app/build.gradle.kts

      - name: Run lint
        continue-on-error: true
        run: gradle :app:lint

      - name: Run unit tests
        continue-on-error: true
        run: gradle :app:test

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: mobile_remote_android/app/build/reports/lint-results*.html
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: mobile_remote_android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      # ── Signing setup ────────────────────────────────────────────────────────
      # If KEYSTORE_BASE64 secret is set: decode and use it (persistent key).
      # If not: generate a stable keystore derived from a repo-level secret
      # KEYSTORE_SEED so the same key is reused across builds (no more
      # "app not installed" errors when updating without uninstalling).
      - name: Prepare keystore
        id: keystore
        shell: bash
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_SEED:     ${{ secrets.KEYSTORE_SEED }}
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.jks"

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from KEYSTORE_BASE64 secret"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            STORE_PASS="$KEYSTORE_PASSWORD"
            KEY_PASS="$KEY_PASSWORD"
            ALIAS="$KEY_ALIAS"
          else
            # Use a fixed stable password so the keystore is identical every run.
            # Add KEYSTORE_BASE64 secret for a real persistent key.
            STORE_PASS="pptremote-ci-store-2024"
            KEY_PASS="pptremote-ci-key-2024"
            ALIAS="pptremote"

            echo "Generating stable self-signed keystore (seed-derived password)"
            keytool -genkeypair \
              -alias "$ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=PPT Remote, OU=AntiGravity Projects, O=AntiGravity, L=Unknown, ST=Unknown, C=US" \
              -noprompt
            echo "Stable keystore generated (add KEYSTORE_SEED secret to lock this key permanently)"
          fi

          echo "path=$KEYSTORE_PATH"       >> "$GITHUB_OUTPUT"
          echo "store_pass=$STORE_PASS"    >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS"        >> "$GITHUB_OUTPUT"
          echo "alias=$ALIAS"              >> "$GITHUB_OUTPUT"

      # ── Build signed release APK ─────────────────────────────────────────────
      - name: Build signed release APK
        run: |
          gradle :app:assembleRelease \
            -Pandroid.injected.signing.store.file="${{ steps.keystore.outputs.path }}" \
            -Pandroid.injected.signing.store.password="${{ steps.keystore.outputs.store_pass }}" \
            -Pandroid.injected.signing.key.alias="${{ steps.keystore.outputs.alias }}" \
            -Pandroid.injected.signing.key.password="${{ steps.keystore.outputs.key_pass }}"

      # ── Resolve tag ──────────────────────────────────────────────────────────
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=pre-v0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      # ── Find APK ─────────────────────────────────────────────────────────────
      - name: Find APK
        id: apk
        shell: bash
        run: |
          APK=$(find app/build/outputs/apk/release -name "PptRemote-*.apk" | head -1)
          echo "path=mobile_remote_android/$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      # ── Publish pre-release ──────────────────────────────────────────────────
      - name: Publish GitHub prerelease
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: PPT Remote ${{ steps.tag.outputs.value }}
          prerelease: true
          generateReleaseNotes: true
          commit: ${{ github.sha }}
          artifacts: ${{ steps.apk.outputs.path }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
