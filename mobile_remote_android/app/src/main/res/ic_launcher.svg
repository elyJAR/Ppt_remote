<?xml version="1.0" encoding="UTF-8"?>
<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#303f9f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eaf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="96" cy="96" r="88" fill="url(#bgGradient)" stroke="#0d47a1" stroke-width="4"/>
  
  <!-- Presentation screen -->
  <rect x="48" y="56" width="96" height="64" rx="4" fill="url(#iconGradient)" stroke="#1a237e" stroke-width="2"/>
  
  <!-- Screen content lines (representing slides) -->
  <rect x="56" y="68" width="32" height="4" rx="2" fill="#1a237e" opacity="0.7"/>
  <rect x="56" y="76" width="48" height="4" rx="2" fill="#1a237e" opacity="0.7"/>
  <rect x="56" y="84" width="24" height="4" rx="2" fill="#1a237e" opacity="0.7"/>
  
  <!-- Remote control device -->
  <rect x="72" y="132" width="48" height="32" rx="8" fill="url(#iconGradient)" stroke="#1a237e" stroke-width="2"/>
  
  <!-- Remote control buttons -->
  <circle cx="84" cy="144" r="4" fill="#1a237e"/>
  <circle cx="96" cy="144" r="4" fill="#1a237e"/>
  <circle cx="108" cy="144" r="4" fill="#1a237e"/>
  
  <!-- Navigation arrows -->
  <polygon points="84,152 88,156 84,160" fill="#1a237e"/>
  <polygon points="108,152 104,156 108,160" fill="#1a237e"/>
  
  <!-- Connection indicator (small dot) -->
  <circle cx="96" cy="128" r="3" fill="#4caf50"/>
</svg>